<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="#">
        <label for="fname">First Name</label>
        <input type="text" name="" id="" required><br>
        <label for="lname">Last Name</label>
        <input type="text" name="" id="" disabled><br>
        <label for="Email">Email</label>
        <input type="email" name="" id="" required><br>
        <label for="DOB">Date of Birth</label>
        <input type="datetime-local" name="" id=""><br>
        <label for="Contact">Contact Number</label>
        <input type="number" name="" id=""><br>
        <label for="Gender">Gender</label><br>
        <label for="male">Male</label>
        <input type="radio" name="male" id="">
        <label for="Female">Female</label>
        <input type="radio" name="male" id=""><br>

        <label for="Country">Country</label>
        <select name="" id="">
            <option value="USA">USA</option>
            <option value="IND" selected>IND</option>
            <option value="CAN">CAN</option>
            <option value="JAP">JAP</option>
            <option value="SIN">SING</option>
        </select>
<br><br>
        <label for="Course">Course</label><br>
        <input type="checkbox" name="" id="">
        <label for="Web Development">Web development</label><br>
        <input type="checkbox" name="" id="">
        <label for="Andriod Development">Andriod App Development</label><br>
        <input type="checkbox" name="" id="">
        <label for="UI">UI UX</label><br><br>

        <label for="Message">Message</label><br><br>
        <textarea name="" id="" cols="35" rows="10"></textarea>
        <input type="submit" value="Save">
        <input type="reset" value="Clear">
    </form>
</body>
</html>
